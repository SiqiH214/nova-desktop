<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

  body {
    width: 72px;
    height: 100vh;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    border-right: 1px solid rgba(255,255,255,0.06);
  }

  /* Traffic light safe zone */
  .titlebar-space {
    height: 44px;
    width: 100%;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }

  .logo {
    width: 32px;
    height: 32px;
    margin: 4px 0 8px;
    opacity: 0.9;
    flex-shrink: 0;
  }

  .logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }

  .sessions {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }
  .sessions::-webkit-scrollbar { display: none; }

  .session-btn {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    letter-spacing: -0.3px;
  }
  .session-btn:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
  }
  .session-btn.active {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
    color: #fff;
  }

  /* Drag state */
  .session-btn.dragging {
    opacity: 0.4;
    transform: scale(0.9);
  }
  .session-btn.drag-over {
    border-color: rgba(124, 58, 237, 0.6);
    background: rgba(124, 58, 237, 0.15);
  }

  /* Close button on hover */
  .session-btn .close {
    display: none;
    position: absolute;
    top: -4px;
    right: -4px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #fff;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    z-index: 10;
  }
  .session-btn:hover .close { display: flex; }

  /* Inline rename input */
  .rename-input {
    position: absolute;
    left: calc(100% + 8px);
    top: 50%;
    transform: translateY(-50%);
    width: 120px;
    padding: 4px 8px;
    background: rgba(30,30,30,0.95);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    z-index: 200;
    backdrop-filter: blur(10px);
  }

  .divider {
    width: 28px;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 4px 0;
    flex-shrink: 0;
  }

  .add-btn {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: transparent;
    border: 1.5px dashed rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    color: rgba(255,255,255,0.3);
    font-size: 18px;
    font-weight: 300;
    margin-bottom: 16px;
  }
  .add-btn:hover {
    border-color: rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.05);
  }

  /* Tooltip — clamp to viewport */
  .session-btn::before {
    content: attr(data-name);
    position: absolute;
    left: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 100;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .session-btn:hover::before { opacity: 1; }
  .session-btn.renaming::before { opacity: 0 !important; }

  /* Keyboard hint */
  .session-btn::after {
    content: attr(data-shortcut);
    position: absolute;
    left: calc(100% + 10px);
    top: calc(50% + 16px);
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: rgba(255,255,255,0.4);
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 500;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 100;
    font-family: 'SF Mono', Menlo, monospace;
  }
  .session-btn:hover::after { opacity: 1; }
  .session-btn.renaming::after { opacity: 0 !important; }
</style>
</head>
<body>

<div class="titlebar-space"></div>

<div class="logo">
  <img id="logo-img" src="" alt="Pika">
</div>

<div class="divider"></div>

<div class="sessions" id="sessions-list"></div>

<div class="add-btn" id="add-btn" title="New session (⌘T)">+</div>

<script>
  // Load logo from build dir
  try {
    document.getElementById('logo-img').src = '../build/icon.png'
  } catch(e) {}

  let state = { sessions: [], activeId: null }
  let draggedId = null

  function getInitials(name) {
    const parts = name.split(' ')
    if (parts.length >= 2) return parts[0][0] + parts[1][0]
    if (name.length >= 2) return name.slice(0, 2)
    return name[0] || '?'
  }

  function render() {
    const list = document.getElementById('sessions-list')
    list.innerHTML = ''

    state.sessions.forEach((s, i) => {
      const btn = document.createElement('div')
      btn.className = 'session-btn' + (s.id === state.activeId ? ' active' : '')
      btn.setAttribute('data-name', s.name)
      btn.setAttribute('data-id', s.id)
      btn.setAttribute('data-shortcut', i < 9 ? `⌘${i + 1}` : '')
      btn.setAttribute('draggable', 'true')
      btn.innerHTML = `
        <span class="label">${getInitials(s.name)}</span>
        ${state.sessions.length > 1 ? '<span class="close" data-close="'+s.id+'">×</span>' : ''}
      `

      // Click → switch
      btn.addEventListener('click', () => window.sidebar.switchSession(s.id))

      // Double-click → rename
      btn.addEventListener('dblclick', (e) => {
        e.stopPropagation()
        startRename(btn, s)
      })

      // Close button
      const closeBtn = btn.querySelector('.close')
      if (closeBtn) {
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation()
          window.sidebar.closeSession(s.id)
        })
      }

      // Drag events
      btn.addEventListener('dragstart', (e) => {
        draggedId = s.id
        btn.classList.add('dragging')
        e.dataTransfer.effectAllowed = 'move'
      })
      btn.addEventListener('dragend', () => {
        btn.classList.remove('dragging')
        draggedId = null
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'))
      })
      btn.addEventListener('dragover', (e) => {
        e.preventDefault()
        e.dataTransfer.dropEffect = 'move'
        if (draggedId && draggedId !== s.id) {
          btn.classList.add('drag-over')
        }
      })
      btn.addEventListener('dragleave', () => {
        btn.classList.remove('drag-over')
      })
      btn.addEventListener('drop', (e) => {
        e.preventDefault()
        btn.classList.remove('drag-over')
        if (!draggedId || draggedId === s.id) return

        // Reorder: move dragged before this one
        const ids = state.sessions.map(x => x.id)
        const fromIdx = ids.indexOf(draggedId)
        const toIdx = ids.indexOf(s.id)
        if (fromIdx === -1 || toIdx === -1) return

        ids.splice(fromIdx, 1)
        ids.splice(toIdx, 0, draggedId)
        window.sidebar.reorderSessions(ids)
      })

      list.appendChild(btn)
    })
  }

  function startRename(btn, session) {
    // Don't show tooltip while renaming
    btn.classList.add('renaming')

    const input = document.createElement('input')
    input.className = 'rename-input'
    input.value = session.name
    input.maxLength = 30
    btn.appendChild(input)
    input.focus()
    input.select()

    function finish() {
      const newName = input.value.trim()
      if (newName && newName !== session.name) {
        window.sidebar.renameSession(session.id, newName)
      }
      btn.classList.remove('renaming')
      input.remove()
    }

    input.addEventListener('blur', finish)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { input.blur() }
      if (e.key === 'Escape') { input.value = session.name; input.blur() }
      e.stopPropagation()
    })
    input.addEventListener('click', (e) => e.stopPropagation())
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    window.sidebar.newSession()
  })

  // Init
  window.sidebar.getSessions().then(data => {
    state = data
    render()
  })

  // Listen for updates
  window.sidebar.onUpdate(data => {
    state = data
    render()
  })
</script>
</body>
</html>
