name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        run: ls -la dist/

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pika-macOS
          path: dist/*.zip
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Pika Desktop v${{ github.run_number }}
          body: |
            Pika desktop app for macOS.
            **Install:** Download the `.zip` for your Mac (arm64 = Apple Silicon, x64 = Intel), unzip it, drag **Pika.app** to your Applications folder, and launch.
          files: dist/*.zip
          draft: false
          prerelease: false
